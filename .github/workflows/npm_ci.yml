name: npm CI

env:
  BUILD_SCRIPTS_DOWNLOADER: https://mirrors.honoka.de/build-scripts/github/download-build-scripts.sh
  BUILD_SCRIPTS_REPO: build-scripts
  BUILD_SCRIPTS_VERSION: 1.0.0

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Download build scripts
        run: |
          DOWNLOADER_NAME=download-build-scripts.sh
          curl -L -o $DOWNLOADER_NAME $BUILD_SCRIPTS_DOWNLOADER
          chmod +x $DOWNLOADER_NAME && ./$DOWNLOADER_NAME
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: '**/package-lock.json'
      - id: npm_build
        name: Build with npm
        env:
          REMOTE_NPM_REGISTRY_URL: ${{ secrets.REMOTE_NPM_REGISTRY_URL }}
        run: |
          projects=(js-utils)
          ./build-scripts/scripts/npm/library/build.sh "${projects[@]}"
      - name: Merge the changes into npm registry and publish
        env:
          IS_DEVELOPMENT_VERSION: ${{ steps.npm_build.outputs.IS_DEVELOPMENT_VERSION }}
          GIT_USERNAME: Kosaka Bun
          GIT_EMAIL: kosaka-bun@qq.com
        run: |
          ./build-scripts/scripts/npm/library/publish.sh

on:
  push:
    branches:
      - dev
    paths-ignore:
      - 'docs/**'
      - '**/.gitignore'
      - 'LICENSE'
      - 'README.md'
  pull_request:
    branches:
      - dev
    paths-ignore:
      - 'docs/**'
      - '**/.gitignore'
      - 'LICENSE'
      - 'README.md'
